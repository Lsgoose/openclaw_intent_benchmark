# Primary Site Configuration
# Location: Primary Datacenter (US-East)

# Network Configuration - PRIMARY SITE
SUBNET=10.0.1.0/24
GATEWAY=10.0.1.1
SERVICE_ENDPOINT=https://api.primary.internal:8443
DNS_SERVERS=10.0.1.10,10.0.1.11

# Infrastructure References - PRIMARY
STORAGE_ARRAY=primary-san-01.internal
BACKUP_TARGET=primary-backup.internal
CACHE_CLUSTER=primary-redis.internal:6379

# Application Settings
MAX_CONNECTIONS=1000
TIMEOUT_SECONDS=30
LOG_LEVEL=info
RATE_LIMIT_PER_MINUTE=600

# Feature Flags
ENABLE_NEW_PAYMENT_FLOW=true
ENABLE_BETA_FEATURES=false
MAINTENANCE_MODE=false

# Security Settings
REQUIRE_TLS=true
MIN_TLS_VERSION=1.3
ALLOWED_ORIGINS=https://app.primary.internal

# Database
DB_HOST=primary-postgres.internal
DB_PORT=5432
DB_POOL_SIZE=50

# Monitoring
METRICS_ENDPOINT=https://metrics.primary.internal:9090
ALERT_MANAGER=primary-alertmgr.internal
