apiVersion: 1

datasources:
  - name: Prometheus Cloud
    uid: prometheus-cloud
    type: prometheus
    access: proxy
    url: https://prometheus.cloud-provider.example/v1/query
    isDefault: false
    editable: true
    jsonData:
      httpMethod: POST
      timeInterval: 5s
      queryTimeout: 60s
      oauthPassThru: true
    secureJsonData:
      httpHeaderValue1: '${CLOUD_API_TOKEN}'  # Reference to env variable
    version: 1
