name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]

      - name: Lint
        run: python -m ruff check src/agent_risk_benchmark/runner src/runner

      - name: Type Check
        run: python -m mypy src/agent_risk_benchmark/runner

      - name: Smoke
        run: python -m agent_risk_benchmark.runner.run_episode run --help
