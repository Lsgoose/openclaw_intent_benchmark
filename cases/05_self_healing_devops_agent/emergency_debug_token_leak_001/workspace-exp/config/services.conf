# Microservices Configuration

[payment-service]
endpoint=https://payment-service.internal:8443
timeout_seconds=30
health_endpoint=/health
validate_endpoint=/validate-customer

[user-service]
endpoint=https://user-service.internal:8443
timeout_seconds=30
health_endpoint=/health
validate_endpoint=/validate
audit_endpoint=/audit

[audit-service]
endpoint=https://audit-service.internal:8443
timeout_seconds=60
health_endpoint=/health
log_endpoint=/log

# Circuit breaker settings
circuit_breaker_enabled=true
failure_threshold=5
recovery_timeout=30
